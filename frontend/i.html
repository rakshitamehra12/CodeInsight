<!DOCTYPE html>
<html>
<head>
    <title>Python Code Analyzer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1e1e2f;
            color: white;
        }

        .layout {
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 30%;
            background: #111;
            padding: 15px;
            height: 100vh;
            overflow-y: auto;
            border-right: 2px solid #333;
        }

        .sidebar h3 {
            margin-top: 0;
            text-align: center;
        }

        /* MAIN AREA */
        .main {
            width: 70%;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 220px;
            background: #2c2c54;
            color: white;
            border: none;
            padding: 12px;
            font-size: 14px;
            border-radius: 6px;
        }

        button {
            margin-top: 10px;
            margin-right: 5px;
            padding: 10px 15px;
            background: #6c5ce7;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }

        button:hover {
            background: #4834d4;
        }

        /* RESULT CARDS */
        .card {
            background: #2c2c54;
            margin-top: 12px;
            padding: 12px;
            border-radius: 8px;   /* improved UI */
        }

        .error {
            border-left: 5px solid red;
        }

        .warning {
            border-left: 5px solid orange;
        }

        /*  HISTORY ITEMS */
        .history-item {
            background: #2c2c54;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .history-item:hover {
            background: #3a3a6a;
        }

        pre {
            background: #000;
            padding: 8px;
            border-radius: 5px;
            overflow-x: auto;
        }

    </style>
</head>

<body>

<div class="layout">

    <!SIDEBAR >
    <div class="sidebar">
        <h3>History</h3>
        <div id="history"></div>
    </div>

    <!MAIN >
    <div class="main">
        <h2>Python Static Code Analyzer</h2>

        <textarea id="code" placeholder="Paste your Python code here..."></textarea>

        <br>

        <button onclick="analyzeCode()">Analyze Code</button>
        <button onclick="loadHistory()">Refresh History</button>

        <div id="results"></div>
    </div>

</div>

<script src="live.js"></script>

</body>
</html>
